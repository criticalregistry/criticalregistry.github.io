<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" width="500" height="500">
  <!-- Background -->
  <rect width="500" height="500" fill="#0A192F"/>

  <!-- Teal left accent bar -->
  <rect x="0" y="0" width="6" height="500" fill="#2a9d8f"/>

  <!-- CR monogram -->
  <text
    x="250"
    y="310"
    font-family="'Montserrat', 'Arial Black', sans-serif"
    font-weight="700"
    font-size="220"
    fill="#FFFFFF"
    text-anchor="middle"
    letter-spacing="-8"
  >CR</text>

  <!-- Teal baseline -->
  <rect x="80" y="355" width="340" height="4" rx="2" fill="#2a9d8f"/>
</svg>
