<svg viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" width="1280" height="640">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;700&amp;family=IBM+Plex+Mono:wght@400&amp;display=swap');
    </style>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a3a5c" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <!-- Dot pattern -->
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#2a9d8f" opacity="0.2"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#0A192F"/>

  <!-- Grid overlay -->
  <rect width="1280" height="640" fill="url(#grid)"/>
  <rect width="1280" height="640" fill="url(#dots)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="640" fill="#2a9d8f"/>

  <!-- Top-right corner accent -->
  <line x1="1180" y1="0" x2="1280" y2="0" stroke="#2a9d8f" stroke-width="1" opacity="0.4"/>
  <line x1="1280" y1="0" x2="1280" y2="100" stroke="#2a9d8f" stroke-width="1" opacity="0.4"/>

  <!-- Bottom-left corner accent -->
  <line x1="0" y1="540" x2="0" y2="640" stroke="#2a9d8f" stroke-width="1" opacity="0.4"/>
  <line x1="0" y1="640" x2="100" y2="640" stroke="#2a9d8f" stroke-width="1" opacity="0.4"/>

  <!-- Risk indicator bars — right side, subtle -->
  <g opacity="0.12">
    <rect x="1060" y="120" width="8" height="400" fill="#2a9d8f"/>
    <rect x="1080" y="200" width="8" height="320" fill="#2a9d8f"/>
    <rect x="1100" y="160" width="8" height="360" fill="#e63946"/>
    <rect x="1120" y="240" width="8" height="280" fill="#2a9d8f"/>
    <rect x="1140" y="100" width="8" height="420" fill="#e63946"/>
    <rect x="1160" y="180" width="8" height="340" fill="#2a9d8f"/>
    <rect x="1180" y="220" width="8" height="300" fill="#2a9d8f"/>
    <rect x="1200" y="140" width="8" height="380" fill="#e63946"/>
    <rect x="1220" y="260" width="8" height="260" fill="#2a9d8f"/>
    <rect x="1240" y="190" width="8" height="330" fill="#2a9d8f"/>
  </g>

  <!-- Label — top -->
  <text x="80" y="108" font-family="'IBM Plex Mono', monospace" font-size="13" fill="#2a9d8f" letter-spacing="4">RISK REGISTRY · PUBLIC ARTIFACT · v0.1</text>

  <!-- Horizontal rule -->
  <line x1="80" y1="126" x2="680" y2="126" stroke="#2a9d8f" stroke-width="0.75" opacity="0.5"/>

  <!-- Main title -->
  <text x="76" y="280" font-family="'Montserrat', sans-serif" font-weight="700" font-size="72" fill="#FFFFFF" letter-spacing="-1">Critical Software</text>
  <text x="76" y="370" font-family="'Montserrat', sans-serif" font-weight="700" font-size="72" fill="#FFFFFF" letter-spacing="-1">Risk Register</text>

  <!-- Tagline -->
  <text x="80" y="440" font-family="'Montserrat', sans-serif" font-weight="300" font-size="22" fill="#8ab4c9" letter-spacing="0.5">Mapping availability risk in critical open source infrastructure</text>

  <!-- Bottom divider -->
  <line x1="80" y1="502" x2="680" y2="502" stroke="#2a9d8f" stroke-width="0.75" opacity="0.5"/>

  <!-- URL -->
  <text x="80" y="534" font-family="'IBM Plex Mono', monospace" font-size="15" fill="#2a9d8f" letter-spacing="1">criticalsoftwareriskregister.com</text>
</svg>
