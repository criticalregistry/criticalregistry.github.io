<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {% endif %}Critical Software Risk Register</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <a class="site-title" href="{{ '/' | relative_url }}">Critical Software Risk Register</a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Home</a>
        <a href="{{ '/whitepaper/' | relative_url }}"{% if page.url contains '/whitepaper' %} class="active"{% endif %}>Whitepaper</a>
        <a href="https://github.com/criticalregistry/registry" target="_blank" rel="noopener">Registry</a>
        <a href="{{ '/methodology' | relative_url }}"{% if page.url contains '/methodology' %} class="active"{% endif %}>Methodology</a>
        <a href="{{ '/landscape' | relative_url }}"{% if page.url contains '/landscape' %} class="active"{% endif %}>Landscape</a>
        <a href="{{ '/about' | relative_url }}"{% if page.url contains '/about' %} class="active"{% endif %}>About</a>
        <a href="mailto:contact@criticalsoftwareriskregister.com" class="nav-contact">Contact</a>
      </nav>
    </div>
  </header>

  <main class="page-content">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <span>© 2026 Critical Software Risk Register</span>
      <span class="sep">·</span>
      <a href="https://creativecommons.org/licenses/by/4.0/" rel="license">CC BY 4.0</a>
      <span class="sep">·</span>
      <a href="{{ '/impressum' | relative_url }}">Impressum</a>
      <span class="sep">·</span>
      <a href="{{ '/datenschutz' | relative_url }}">Datenschutz</a>
    </div>
  </footer>

</body>
</html>
